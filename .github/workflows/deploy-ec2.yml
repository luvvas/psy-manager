name: Deploy to AWS EC2 and S3
on:
  push:
    branches:
      - master

jobs:
  quality-gate:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run API Unit Tests
        run: bun run test

      - name: Build API
        run: bun run build:api

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Frontend
        env:
          VITE_API_URL: https://dswfc48bg9ft6.cloudfront.net
          VITE_DESKTOP_DOWNLOAD_URL: https://psy-manager-releases.s3.sa-east-1.amazonaws.com/psy-manager-setup.exe
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: bun run --cwd apps/web build

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 1

  deploy-backend:
    name: Deploy to EC2 via SSH
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Pull latest code on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/psy-manager || {
              git clone https://github.com/${{ github.repository }}.git ~/psy-manager
              cd ~/psy-manager
            }
            git fetch --all
            git reset --hard origin/master

      - name: Fetch secrets from AWS SSM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            if ! command -v aws &> /dev/null; then
              sudo snap install aws-cli --classic
            fi
            POSTGRES_PASSWORD=$(aws ssm get-parameter --region sa-east-1 --name "/psy-manager/prod/POSTGRES_PASSWORD" --with-decryption --query "Parameter.Value" --output text)
            cat > ~/psy-manager/.env.prod << EOF
            DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/psy_manager
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=psy_manager
            BETTER_AUTH_SECRET=$(aws ssm get-parameter --region sa-east-1 --name "/psy-manager/prod/BETTER_AUTH_SECRET" --with-decryption --query "Parameter.Value" --output text)
            GOOGLE_CLIENT_SECRET=$(aws ssm get-parameter --region sa-east-1 --name "/psy-manager/prod/GOOGLE_CLIENT_SECRET" --with-decryption --query "Parameter.Value" --output text)
            STORAGE_DRIVER=s3
            AWS_REGION=sa-east-1
            AWS_DOCUMENTS_BUCKET=$(aws ssm get-parameter --region sa-east-1 --name "/psy-manager/prod/AWS_DOCUMENTS_BUCKET" --query "Parameter.Value" --output text)
            PUBLIC_URL=$(aws ssm get-parameter --region sa-east-1 --name "/psy-manager/prod/PUBLIC_URL" --query "Parameter.Value" --output text)
            TURN_URL=$(aws ssm get-parameter --region sa-east-1 --name "/psy-manager/prod/TURN_URL" --query "Parameter.Value" --output text)
            TURN_USERNAME=$(aws ssm get-parameter --region sa-east-1 --name "/psy-manager/prod/TURN_USERNAME" --query "Parameter.Value" --output text)
            TURN_CREDENTIAL=$(aws ssm get-parameter --region sa-east-1 --name "/psy-manager/prod/TURN_CREDENTIAL" --with-decryption --query "Parameter.Value" --output text)
            ENCRYPTION_KEY=$(aws ssm get-parameter --region sa-east-1 --name "/psy-manager/prod/ENCRYPTION_KEY" --with-decryption --query "Parameter.Value" --output text)
            SENTRY_DSN=$(aws ssm get-parameter --region sa-east-1 --name "/psy-manager/prod/SENTRY_DSN" --query "Parameter.Value" --output text)
            ALLOWED_ORIGINS=https://dswfc48bg9ft6.cloudfront.net,app://localhost
            EOF

      - name: Restart Docker services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/psy-manager
            set -a && source .env.prod && set +a
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build

      - name: Run database migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/psy-manager
            set -a && source .env.prod && set +a
            docker compose -f docker-compose.prod.yml exec -T api bun run db:migrate

  deploy-frontend:
    name: Sync Frontend to S3
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Download web dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Sync immutable assets to S3 Bucket
        run: |
          aws s3 sync ./apps/web/dist/assets s3://psy-manager-frontent-lucas/assets \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Sync app shell to S3 Bucket
        run: |
          aws s3 sync ./apps/web/dist s3://psy-manager-frontent-lucas \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  deploy-desktop:
    name: Build & Release Desktop App
    runs-on: windows-latest
    needs: build-frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Download web dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Compile TypeScript
        working-directory: apps/desktop
        run: bun run build

      - name: Publish Desktop App to S3
        working-directory: apps/desktop
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # electron-builder always runs "npm/bun install --production" before packaging.
          # In a bun workspace this fails due to workspace:* refs in sibling packages.
          # Fix: capture node's full path first (setup-bun drops a node.cmd shim into
          # ~/.bun/bin that disappears if we manipulate PATH), shim both package managers
          # as no-ops, then invoke electron-builder via node directly (not bun's .bin/
          # launcher) using the captured absolute path.
          $nodeExe = (Get-Command node -ErrorAction Stop).Source
          $shimDir = "$env:TEMP\pkg-shim"
          New-Item -ItemType Directory -Force -Path $shimDir | Out-Null
          New-Item -ItemType Directory -Force -Path node_modules | Out-Null
          "@echo off`nexit /b 0" | Out-File -FilePath "$shimDir\npm.cmd" -Encoding ascii
          "@echo off`nexit /b 0" | Out-File -FilePath "$shimDir\bun.cmd" -Encoding ascii
          $env:PATH = "$shimDir;" + $env:PATH
          & $nodeExe "..\..\node_modules\electron-builder\cli.js" --config electron-builder.config.js --publish always
