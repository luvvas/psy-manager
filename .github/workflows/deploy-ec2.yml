name: Deploy to AWS EC2 and S3
on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality-gate:
    name: CI / API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run API Unit Tests
        run: bun run test

      - name: Build API
        run: bun run build:api

  build-frontend:
    name: CI / Frontend
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Frontend
        env:
          VITE_API_URL: https://dswfc48bg9ft6.cloudfront.net
          VITE_DESKTOP_DOWNLOAD_URL: https://psy-manager-releases.s3.sa-east-1.amazonaws.com/psy-manager-setup.exe
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: bun run --cwd apps/web build

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 1

  deploy-backend:
    name: Deploy / API
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::952078551945:role/psy-manager-github-actions-role
          aws-region: sa-east-1

      - name: Pull latest code on EC2
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          COMMAND_ID=$(aws ssm send-command \
            --region sa-east-1 \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /home/ubuntu/psy-manager 2>/dev/null || git clone https://github.com/${{ github.repository }}.git /home/ubuntu/psy-manager && cd /home/ubuntu/psy-manager && git fetch --all && git reset --hard origin/master"]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation --region sa-east-1 --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Status: $STATUS"
            if [[ "$STATUS" == "Success" ]]; then break; fi
            if [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              aws ssm get-command-invocation --region sa-east-1 --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 5
          done

      - name: Deploy (secrets + restart + migrate)
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          COMMAND_ID=$(aws ssm send-command \
            --region sa-east-1 \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["bash /home/ubuntu/psy-manager/scripts/deploy.sh 2>&1"]' \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"
          for i in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation --region sa-east-1 --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Status: $STATUS"
            if [[ "$STATUS" == "Success" ]]; then
              aws ssm get-command-invocation --region sa-east-1 --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardOutputContent" --output text
              break
            fi
            if [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              echo "=== OUTPUT ==="
              aws ssm get-command-invocation --region sa-east-1 --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardOutputContent" --output text
              echo "=== ERRORS ==="
              aws ssm get-command-invocation --region sa-east-1 --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 5
          done

  deploy-frontend:
    name: Deploy / Web
    runs-on: ubuntu-latest
    needs: build-frontend
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download web dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::952078551945:role/psy-manager-github-actions-role
          aws-region: sa-east-1

      - name: Sync immutable assets to S3 Bucket
        run: |
          aws s3 sync ./apps/web/dist/assets s3://psy-manager-frontent-lucas/assets \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Sync app shell to S3 Bucket
        run: |
          aws s3 sync ./apps/web/dist s3://psy-manager-frontent-lucas \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  deploy-desktop:
    name: Release / Desktop
    runs-on: windows-latest
    needs: build-frontend
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~\.bun\install\cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Cache electron-builder binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('apps/desktop/package.json') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Download web dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Compile TypeScript
        working-directory: apps/desktop
        run: bun run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::952078551945:role/psy-manager-github-actions-role
          aws-region: sa-east-1

      - name: Publish Desktop App to S3
        working-directory: apps/desktop
        run: |
          # electron-builder always runs "npm/bun install --production" before packaging.
          # In a bun workspace this fails due to workspace:* refs in sibling packages.
          # Fix: capture node's full path first (setup-bun drops a node.cmd shim into
          # ~/.bun/bin that disappears if we manipulate PATH), shim both package managers
          # as no-ops, then invoke electron-builder via node directly (not bun's .bin/
          # launcher) using the captured absolute path.
          $nodeExe = (Get-Command node -ErrorAction Stop).Source
          $shimDir = "$env:TEMP\pkg-shim"
          New-Item -ItemType Directory -Force -Path $shimDir | Out-Null
          New-Item -ItemType Directory -Force -Path node_modules | Out-Null
          "@echo off`nexit /b 0" | Out-File -FilePath "$shimDir\npm.cmd" -Encoding ascii
          "@echo off`nexit /b 0" | Out-File -FilePath "$shimDir\bun.cmd" -Encoding ascii
          $env:PATH = "$shimDir;" + $env:PATH
          & $nodeExe "..\..\node_modules\electron-builder\cli.js" --config electron-builder.config.js --publish always
