name: Deploy to AWS EC2 and S3
on:
  push:
    branches:
      - master

jobs:
  deploy-backend:
    name: Deploy to EC2 via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 Instance
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/psy-manager || {
              git clone https://github.com/${{ github.repository }}.git ~/psy-manager
              cd ~/psy-manager
            }
            git fetch --all
            git reset --hard origin/master
            
            # Buscando chaves confidenciais direto do cofre SSM usando o IAM Role do EC2
            export DATABASE_URL=$(aws ssm get-parameter --region sa-east-1 --name "/psy-manager/prod/DATABASE_URL" --with-decryption --query "Parameter.Value" --output text)
            export BETTER_AUTH_SECRET=$(aws ssm get-parameter --region sa-east-1 --name "/psy-manager/prod/BETTER_AUTH_SECRET" --with-decryption --query "Parameter.Value" --output text)
            export GOOGLE_CLIENT_SECRET=$(aws ssm get-parameter --region sa-east-1 --name "/psy-manager/prod/GOOGLE_CLIENT_SECRET" --with-decryption --query "Parameter.Value" --output text)

            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml exec -T api bun run db:migrate

  deploy-frontend:
    name: Build & Sync Frontend to S3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Frontend
        env:
          # Points the browser client to your public EC2 endpoint
          VITE_API_URL: https://dswfc48bg9ft6.cloudfront.net
        run: bun run --filter @psy-manager/web build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Sync to S3 Bucket
        # Syncs the built dist folder directly to the bucket
        run: aws s3 sync ./apps/web/dist s3://psy-manager-frontent-lucas --delete
