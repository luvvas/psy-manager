name: Deploy to AWS ECS

on:
  push:
    branches:
      - main # Or your default production branch (e.g., master)

jobs:
  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-platform builds if needed)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ============================================
      # 1. Build & Push API (Backend)
      # ============================================
      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.AWS_ECR_API_REPO }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.AWS_ECR_API_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ============================================
      # 2. Build & Push Web (Frontend)
      # ============================================
      - name: Build and Push Web Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.AWS_ECR_WEB_REPO }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.AWS_ECR_WEB_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ============================================
      # 3. Deploy to AWS ECS (API Service)
      # ============================================
      - name: Download API Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.AWS_ECS_API_TASK_DEF_FAMILY }} \
            --query taskDefinition > task-definition-api.json

      - name: Fill in the new image ID in the Amazon ECS task definition (API)
        id: render-api-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-api.json
          container-name: api # Name of your container in the task definition
          image: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.AWS_ECR_API_REPO }}:${{ github.sha }}

      - name: Deploy Amazon ECS Task Definition (API Service)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-api-task-def.outputs.task-definition }}
          service: ${{ secrets.AWS_ECS_API_SERVICE }}
          cluster: ${{ secrets.AWS_ECS_CLUSTER }}
          wait-for-service-stability: true

      # ============================================
      # 4. Deploy to AWS ECS (Web Service)
      # ============================================
      - name: Download Web Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.AWS_ECS_WEB_TASK_DEF_FAMILY }} \
            --query taskDefinition > task-definition-web.json

      - name: Fill in the new image ID in the Amazon ECS task definition (Web)
        id: render-web-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-web.json
          container-name: web # Name of your container in the task definition
          image: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.AWS_ECR_WEB_REPO }}:${{ github.sha }}

      - name: Deploy Amazon ECS Task Definition (Web Service)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-web-task-def.outputs.task-definition }}
          service: ${{ secrets.AWS_ECS_WEB_SERVICE }}
          cluster: ${{ secrets.AWS_ECS_CLUSTER }}
          wait-for-service-stability: true
